name: Reingesta — pont del botó (poll)

# Pont entre el botó "↻ Reingesta" del PWA i la reingesta al núvol.
#
# El botó insereix una fila a fcbillar.reingest_requests (status='pending'). Aquest
# workflow lleuger comprova cada 15 min si n'hi ha de pendents i, si cal, dispara
# el workflow pesat reingest.yml (via repository_dispatch). Substitueix el watcher
# local (scripts/reingest_watcher.ps1), que requeria el PC encès.
#
# Per què un PAT i no el GITHUB_TOKEN: un esdeveniment disparat amb el GITHUB_TOKEN
# per defecte NO desencadena altres workflows (protecció anti-recursió). Cal un PAT
# fine-grained (només aquest repo, permís Actions: Read and write) desat com a
# secret GH_DISPATCH_PAT.
#
# El tancament de les peticions (running → done/error) el fa reingest.yml al final
# (`fcbillar state report --close-requests`).
#
# COOLDOWN anti-bucle: hi ha hagut casos de files 'pending' fantasma que reapareixen
# (inseridor extern no identificat, 2026-06). Sense protecció, el poll dispararia una
# reingesta completa cada 15 min. Per això NO disparem si l'última reingesta va acabar
# fa menys de COOLDOWN_MIN minuts (es llegeix de fcbillar.cloud_status.last_run).

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: reingest-dispatch
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Comprova pendents i dispara reingest.yml
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_DISPATCH_PAT: ${{ secrets.GH_DISPATCH_PAT }}
        run: |
          set -euo pipefail
          REST="${SUPABASE_URL%/}/rest/v1/reingest_requests"
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          pending="$(curl -fsS "$REST?status=eq.pending&select=id" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Accept-Profile: fcbillar")"
          count="$(echo "$pending" | jq 'length')"
          echo "Peticions pendents: $count"
          if [ "$count" -eq 0 ]; then exit 0; fi

          # Cooldown anti-bucle: no disparis si l'última reingesta va acabar fa poc.
          COOLDOWN_MIN=20
          last_run="$(curl -fsS "${SUPABASE_URL%/}/rest/v1/cloud_status?id=eq.1&select=last_run" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Accept-Profile: fcbillar" | jq -r '.[0].last_run // empty')"
          if [ -n "$last_run" ]; then
            age_min=$(( ( $(date -u +%s) - $(date -u -d "$last_run" +%s) ) / 60 ))
            if [ "$age_min" -lt "$COOLDOWN_MIN" ]; then
              echo "Cooldown actiu (última fa ${age_min} min < ${COOLDOWN_MIN}). Deixo les pendents a la cua."
              exit 0
            fi
          fi

          # Marca pending → running (idempotent; el tancament el fa reingest.yml).
          curl -fsS -X PATCH "$REST?status=eq.pending" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Profile: fcbillar" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"running\",\"started_at\":\"$NOW\"}"

          # Dispara la reingesta pesada (repository_dispatch type 'reingest').
          curl -fsS -X POST "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -H "Authorization: Bearer $GH_DISPATCH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"event_type":"reingest"}'
          echo "Reingesta disparada."
