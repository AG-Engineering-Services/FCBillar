name: Publish live opens

# Bolca l'estat EN VIU dels Opens en curs (totes les modalitats) a Supabase
# (taula fcbillar.open_live), perquè l'app web en mostri el seguiment en temps
# real. Només llegeix pàgines públiques de la federació (sense login) i escriu a
# Supabase amb la service_role.
#
# REQUISIT: secrets al repo (Settings → Secrets and variables → Actions):
#   - SUPABASE_URL
#   - SUPABASE_SERVICE_ROLE_KEY
#
# CADÈNCIA: es llança CADA HORA (minut 0), 6–20 UTC. GitHub reparteix els crons
# HORARIS de manera molt més fiable que els sub-horaris (`*/15`, que estrangula i
# arriba a saltar-se hores senceres —vist el 2026-07-11, quan el primer tret del
# dia no va arribar). Cada execució fa un BUCLE INTERN que refresca cada ~2 min;
# el bucle és llarg (~5 h) a posta: si GitHub deixa caure alguns trets horaris,
# l'últim que SÍ va arrencar segueix publicant fins que el següent el rellevi
# (cancel-in-progress). Així n'hi ha prou que arrenqui ~1 tret cada poques hores.
#
# Finestra: DISSABTES i DIUMENGES, 8:00–22:00 hora local (06–20 UTC a l'estiu,
# CEST=UTC+2; a l'hivern CET=UTC+1 caldria '0 7-21 * * 6,0'). Dies: 6=ds, 0=dg.

on:
  schedule:
    - cron: '0 6-20 * * 6,0'     # cada hora, tota la finestra (ds/dg)
    # Backup a mig matí: GitHub sol DEIXAR CAURE els primers trets del dia (el
    # 2026-07-12 va perdre 06h i 07h UTC i no va entrar fins a les 08:21), i les
    # partides comencen ~09h local. Un segon tret a cada :30 de 6-10h dobla les
    # opcions que n'entri un d'hora. cancel-in-progress fa que reiniciï net.
    - cron: '30 6-10 * * 6,0'
  workflow_dispatch: {}

# Un nou tret reinicia el bucle des de zero (sempre dades fresques, sense pila).
concurrency:
  group: publish-live-opens
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 310
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Publish live opens (bucle intern ~2 min durant ~70 min)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          END=$(( SECONDS + 18000 ))   # ~5 h: el bucle no acaba abans del següent tret (GitHub estrangula els crons; cancel-in-progress reinicia)
          i=0
          while [ "$SECONDS" -lt "$END" ]; do
            i=$(( i + 1 ))
            echo "::group::publicació #$i (t=${SECONDS}s)"
            uv run --no-dev fcbillar publish-live-opens || true
            echo "::endgroup::"
            [ "$SECONDS" -lt "$END" ] && sleep 120
          done
