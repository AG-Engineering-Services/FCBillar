name: Reingesta no-logada (núvol)

# Reingesta DIÀRIA de les dades PÚBLIQUES de FCBillar (sense login federatiu):
# lliga, copa i opens/individuals. L'estat (les dues BD SQLite) es guarda GRATIS
# com a assets d'un GitHub Release (tag 'fcb-state'), no a cap servei extern.
# Incorpora les novetats de fcbillar.cat i publica a Supabase, d'on l'app web
# (Vercel) llegeix en temps d'execució.
#
# Per què cal persistir la BD encara que sigui "no-logat":
#   - publish-cloud publica des de data/fcbillar.db (cal el players master per
#     enllaçar partides, i els rànquings que el PC hi ha deixat).
#   - el ScraperClient de fcbillar llança Chromium i EXIGEIX que existeixi
#     session/storage_state.json. PERÒ les pàgines de lliga/copa/opens són
#     públiques → n'hi ha prou amb una sessió BUIDA (verificat), que generem al
#     vol. Així NO exposem cap credencial de login al release públic.
#
# DIVISIÓ D'AMOS (evita clobbering PC↔núvol):
#   - PC (weekly_reingest.ps1, LOGAT):  rànquings + games  → puja la BD al release
#   - Núvol (aquest job, NO-LOGAT):     lliga + copa + opens
#   El núvol baixa sempre la BD fresca del PC, així publish-cloud reescriu els
#   mateixos rànquings (idempotent) i només canvia lliga/copa/opens. Els dos
#   escriuen al mateix release (last-writer-wins); no coincideixen en el temps
#   (PC ~06-07h UTC dissabte/diumenge, núvol 21h UTC cada dia).
#
# Disparadors:
#   - schedule:          cada dia 21:00 UTC (≈22:00 Barcelona a l'hivern, 23:00 a
#                        l'estiu; GH cron és UTC sense canvi d'hora — l'1h de drift
#                        és irrellevant perquè caça el dia sencer de competició)
#   - workflow_dispatch: manual (inputs force / copa_edicio)
#
# REQUISITS:
#   - Secrets (Settings → Secrets and variables → Actions):
#       SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
#     (GITHUB_TOKEN ja el proporciona Actions; amb permissions: contents: write
#      pot escriure els assets del release.)
#   - SEED inicial des del PC (una vegada):
#       gh release create fcb-state --prerelease --title "Estat canònic (reingest)" \
#         --notes "BD del workflow reingest-nologin. No editar a mà."
#       gh release upload fcb-state data/fcbillar.db data/fcb_opens.db --clobber

on:
  schedule:
    - cron: '0 21 * * *'        # cada dia 21:00 UTC ≈ 22:00 Barcelona (hivern)
    # Caps de setmana, cada hora 07-20 UTC (≈9-22 local): manté pending_games
    # (i lliga/copa/opens) fresc mentre hi ha opens en directe. El 'gate' ho
    # OMET si no hi ha cap open en directe, per no fer feina pesada en va.
    - cron: '0 7-20 * * 6,0'
  workflow_dispatch:
    inputs:
      force:
        description: "Força encara que sigui dins l'aturada d'estiu (1-24 ago)"
        type: boolean
        default: false
      copa_edicio:
        description: "ID d'edició de la Copa a fcbillar.cat"
        default: "7"

# Serialitza i NO cancel·la: mai matar una escriptura del release a mig fer.
concurrency:
  group: reingest
  cancel-in-progress: false

jobs:
  reingest-nologin:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write          # per pujar/baixar assets del release fcb-state
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STATE_TAG: fcb-state
      COPA_EDICIO: ${{ github.event.inputs.copa_edicio || '7' }}
      FORCE: ${{ github.event.inputs.force || 'false' }}
    steps:
      - uses: actions/checkout@v4

      # Porta d'aturada d'estiu (omet 1-24 d'agost) + porta d'opens en directe
      # per als trets HORARIS de cap de setmana.
      - id: gate
        env:
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$FORCE" = "true" ]; then echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          M=$(date -u +%m); D=$(date -u +%d)
          if [ "$M" = "08" ] && [ "$D" -lt 25 ]; then
            echo "Aturada d'estiu (1-24 d'agost): ometo la reingesta."
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Trets HORARIS de cap de setmana (07-20 UTC): NOMÉS si hi ha algun open
          # en directe (id positiu a open_live). El tret diari (21:00) i els
          # manuals (workflow_dispatch) corren sempre. `10#` evita l'error d'octal.
          H=$((10#$(date -u +%H)))
          if [ "$EVENT" = "schedule" ] && [ "$H" -ge 7 ] && [ "$H" -le 20 ]; then
            LIVE=$(curl -s \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Accept-Profile: fcbillar" \
              "$SUPABASE_URL/rest/v1/open_live?select=fcb_division_id&fcb_division_id=gt.0&limit=1")
            if [ "$LIVE" = "[]" ] || [ -z "$LIVE" ]; then
              echo "Tret horari de cap de setmana sense opens en directe → ometo."
              echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
            fi
            echo "Opens en directe detectats → segueixo."
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Set up uv
        if: steps.gate.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Chromium per al ScraperClient (lliga/copa/individuals de fcbillar). Clau
      # de cau lligada a uv.lock, que fixa la versió de playwright (i del Chromium).
      - name: Cache Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install Chromium
        if: steps.gate.outputs.skip != 'true'
        run: uv run --no-dev playwright install --with-deps chromium

      # Baixa l'estat (les 2 BD) del release i genera una sessió BUIDA. Si el
      # release/asset no existeix, falla expressament: cal fer el SEED abans (la
      # BD amb el players master + rànquings del PC és imprescindible).
      - name: Baixa l'estat del release (BD) + sessió buida
        if: steps.gate.outputs.skip != 'true'
        run: |
          gh release download "$STATE_TAG" --dir data \
            --pattern 'fcbillar.db' --pattern 'fcb_opens.db' --clobber
          mkdir -p session
          printf '%s' '{"cookies":[],"origins":[]}' > session/storage_state.json
          ls -lh data/fcbillar.db data/fcb_opens.db

      - name: Reingesta no-logada (passos aïllats, continua si un falla)
        if: steps.gate.outputs.skip != 'true'
        run: |
          set +e
          NOK=0; NFAIL=0
          run() { local name="$1"; shift; echo "::group::$name"; "$@"; local rc=$?; echo "exit=$rc"; echo "::endgroup::"; if [ "$rc" -eq 0 ]; then NOK=$((NOK+1)); else NFAIL=$((NFAIL+1)); fi; }

          # Pàgines públiques (Chromium amb sessió buida — n'hi ha prou)
          run "ingest-lliga"         uv run --no-dev fcbillar ingest-lliga 36
          run "ingest-copa"          uv run --no-dev fcbillar ingest-copa "$COPA_EDICIO"
          run "ingest-individuals"   uv run --no-dev fcbillar ingest-individuals
          run "scrape-current-opens" uv run --no-dev python -m fcb_opens.cli scrape-current-opens
          run "scrape-lliga"         uv run --no-dev python -m fcb_opens.cli scrape-lliga 36 --full

          # Publicació a Supabase (fcbillar publica tot des de la BD; els rànquings
          # coincideixen amb els que el PC ja va pujar al release → idempotent).
          run "publish-cloud"        uv run --no-dev fcbillar publish-cloud
          run "supabase-sync"        uv run --no-dev python -m fcb_opens.cli supabase-sync
          run "encoding-scan"        uv run --no-dev python scripts/repair_supabase_encoding.py

          echo "N_OK=$NOK"     >> "$GITHUB_ENV"
          echo "N_FAIL=$NFAIL" >> "$GITHUB_ENV"
          echo "Resum: OK=$NOK FALLATS=$NFAIL"

      # Repuja les BD al release encara que algun pas hagi fallat (upserts parcials
      # però vàlids); mai sobre una execució saltada per l'aturada d'estiu.
      - name: Repuja l'estat (BD) al release
        if: always() && steps.gate.outputs.skip != 'true'
        run: |
          gh release upload "$STATE_TAG" data/fcbillar.db data/fcb_opens.db --clobber
