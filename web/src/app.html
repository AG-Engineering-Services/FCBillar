<!doctype html>
<html lang="ca" class="h-full">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg?v=2" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#0b3d2e" />
		<script>
			// Aplica el tema ABANS del primer pintat per evitar el flaix blanc.
			// Mateixa lògica que $lib/theme.ts: preferència desada o, si no n'hi
			// ha, la del sistema.
			(function () {
				try {
					var t = localStorage.getItem('theme');
					var dark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
					if (dark) {
						document.documentElement.classList.add('dark');
						var m = document.querySelector('meta[name="theme-color"]');
						if (m) m.setAttribute('content', '#020617');
					}
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body
		data-sveltekit-preload-data="hover"
		class="h-full bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100"
	>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
